<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0A0A10">
<title>Autentificare · IQ Trivia RO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="auth-page">
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-2" aria-hidden="true"></div>

  <header class="auth-header">
    <a href="index.html" class="back-link" aria-label="Înapoi la pagina principală">
      <span class="back-arrow">←</span>
      <span>Înapoi</span>
    </a>
    <div class="auth-brand">
      <span class="crown-mini" aria-hidden="true">◆</span>
      <span class="brand-mini">IQ TRIVIA <span class="accent">RO</span></span>
    </div>
  </header>

  <section class="auth-card">
    <div class="auth-tabs" role="tablist">
      <button class="tab active" id="tabLogin" role="tab" aria-selected="true" data-tab="login" type="button">
        Conectare
      </button>
      <button class="tab" id="tabRegister" role="tab" aria-selected="false" data-tab="register" type="button">
        Cont nou
      </button>
      <span class="tab-indicator" aria-hidden="true"></span>
    </div>

    <form class="auth-form" id="authForm" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email"
               inputmode="email" placeholder="tu@exemplu.ro" required>
      </div>

      <div class="field">
        <label for="password">Parolă</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password"
                 autocomplete="current-password" placeholder="Minim 6 caractere"
                 minlength="6" required>
          <button type="button" class="toggle-pass" id="togglePass"
                  aria-label="Arată parola">👁</button>
        </div>
        <p class="hint" id="passHint">Minim 6 caractere</p>
      </div>

      <button type="submit" class="btn-primary btn-submit" id="btnSubmit">
        <span class="btn-text">Conectează-mă</span>
        <span class="btn-loader" aria-hidden="true"></span>
      </button>

      <div class="form-msg" id="formMsg" role="status" aria-live="polite"></div>
    </form>
  </section>

  <footer class="auth-foot">
    <p id="switchText">Nu ai cont? <button type="button" class="link-switch" id="switchBtn">Creează acum</button></p>
  </footer>
</main>

<script type="module" src="auth.js"></script>
</body>
</html>
