<!DOCTYPE html>

<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0A0A10">
<title>Joc - IQ Trivia RO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="map.css">
<link rel="stylesheet" href="game.css">
</head>
<body class="game-page">

<header class="game-header">
  <button class="header-btn" id="back-btn" type="button" aria-label="Inapoi la moduri">
    <span aria-hidden="true">&larr;</span>
  </button>

  <div class="header-stats">
    <div class="stat" aria-label="Tari cucerite">
      <span class="stat-icon" aria-hidden="true">&#127758;</span>
      <span id="stat-conquered">0</span>
    </div>
    <div class="stat" aria-label="ELO rating">
      <span class="stat-icon" aria-hidden="true">&#9889;</span>
      <span id="stat-elo">1000</span>
    </div>
    <div class="stat" aria-label="Streak">
      <span class="stat-icon" aria-hidden="true">&#128293;</span>
      <span id="stat-streak">0</span>
    </div>
  </div>
</header>

<main id="map-container" class="map-wrap" aria-label="Harta Europei"></main>

<button class="zoom-reset-btn" id="reset-btn" type="button" aria-label="Reset zoom">⌖</button>

<div class="info-panel" id="info-panel">Tap pe un vecin (cyan) pentru a ataca</div>

<aside class="islands-panel" id="islands-panel" aria-label="Insule"></aside>

<!-- ===== ECRAN INTREBARE ===== -->

<section class="question-screen hidden" id="question-screen" aria-modal="true" role="dialog">
  <header class="q-header">
    <button class="header-btn" id="q-close-btn" type="button" aria-label="Renunta">
      <span aria-hidden="true">&times;</span>
    </button>

```
<div class="q-progress">
  <span id="q-current">1</span>
  <span>/3</span>
  <span class="q-target" id="q-target">--</span>
</div>

<div class="q-timer-wrap">
  <svg class="q-timer-ring" viewBox="0 0 36 36" aria-hidden="true">
    <circle class="q-timer-bg" cx="18" cy="18" r="15.9155"/>
    <circle class="q-timer-fg" id="q-timer-fg" cx="18" cy="18" r="15.9155"
            stroke-dasharray="100, 100" stroke-dashoffset="0"/>
  </svg>
  <span class="q-timer-text" id="q-timer-text">45</span>
</div>
```

  </header>

  <div class="q-body">
    <p class="q-category" id="q-category">General</p>
    <h2 class="q-question" id="q-question">Se incarca...</h2>

```
<div class="q-options">
  <button class="q-option" id="q-opt-a" type="button">
    <span class="q-letter">A</span>
    <span class="q-text" id="q-text-a">--</span>
  </button>
  <button class="q-option" id="q-opt-b" type="button">
    <span class="q-letter">B</span>
    <span class="q-text" id="q-text-b">--</span>
  </button>
  <button class="q-option" id="q-opt-c" type="button">
    <span class="q-letter">C</span>
    <span class="q-text" id="q-text-c">--</span>
  </button>
</div>

<div class="q-feedback hidden" id="q-feedback">
  <span class="q-feedback-icon" id="q-feedback-icon"></span>
  <span class="q-feedback-text" id="q-feedback-text"></span>
</div>

<div class="q-score-bar" aria-label="Scor intrebari curente">
  <span class="q-score-dot" id="q-dot-1"></span>
  <span class="q-score-dot" id="q-dot-2"></span>
  <span class="q-score-dot" id="q-dot-3"></span>
</div>
```

  </div>
</section>

<!-- ===== VICTORIE ===== -->

<section class="overlay-screen hidden" id="victory-screen" aria-modal="true" role="dialog">
  <div class="overlay-card overlay-card--victory">
    <div class="overlay-icon" aria-hidden="true">&#127881;</div>
    <h2 class="overlay-title">Victorie!</h2>
    <p class="overlay-subtitle" id="victory-country">--</p>
    <p class="overlay-detail" id="victory-elo">+50 ELO</p>
    <button class="overlay-btn" id="victory-continue" type="button">Continua cucerirea</button>
  </div>
</section>

<!-- ===== INFRANGERE ===== -->

<section class="overlay-screen hidden" id="defeat-screen" aria-modal="true" role="dialog">
  <div class="overlay-card overlay-card--defeat">
    <div class="overlay-icon" aria-hidden="true">&#128557;</div>
    <h2 class="overlay-title">Infrangere</h2>
    <p class="overlay-detail" id="defeat-message">--</p>
    <button class="overlay-btn" id="defeat-retreat" type="button">Retragere</button>
  </div>
</section>

<!-- ===== TRIUMF FINAL ===== -->

<section class="overlay-screen hidden" id="all-conquered-screen" aria-modal="true" role="dialog">
  <div class="overlay-card overlay-card--triumph">
    <div class="overlay-icon" aria-hidden="true">&#128081;</div>
    <h2 class="overlay-title">Europa cucerita!</h2>
    <p class="overlay-detail" id="triumph-elo">--</p>
    <button class="overlay-btn" id="triumph-leaderboard" type="button">Vezi clasament</button>
  </div>
</section>

<script type="module" src="game-logic.js"></script>

</body>
</html>
