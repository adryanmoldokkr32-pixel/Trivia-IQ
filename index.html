<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0A0A10">
<meta name="description" content="Joc web de cultură generală. Cucerește Europa prin întrebări din 13 categorii.">
<meta property="og:title" content="IQ Trivia RO">
<meta property="og:description" content="Cucerește Europa prin cunoaștere">
<meta property="og:type" content="website">
<title>IQ Trivia RO · Cucerește Europa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="landing">
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-2" aria-hidden="true"></div>

  <header class="brand">
    <div class="crown" aria-hidden="true">◆</div>
    <h1 class="logo">IQ TRIVIA <span class="accent">RO</span></h1>
    <p class="tagline">Cucerește Europa prin cunoaștere</p>
  </header>

  <div class="map-hero" aria-hidden="true">
    <svg viewBox="0 0 300 220" class="europe-svg" xmlns="http://www.w3.org/2000/svg">
      <g class="links">
        <line x1="70" y1="70" x2="110" y2="85"/>
        <line x1="110" y1="85" x2="150" y2="75"/>
        <line x1="150" y1="75" x2="190" y2="95"/>
        <line x1="110" y1="85" x2="140" y2="130"/>
        <line x1="140" y1="130" x2="180" y2="125"/>
        <line x1="180" y1="125" x2="220" y2="110"/>
        <line x1="140" y1="130" x2="120" y2="170"/>
        <line x1="180" y1="125" x2="200" y2="160"/>
        <line x1="150" y1="75" x2="160" y2="40"/>
        <line x1="150" y1="75" x2="180" y2="125"/>
      </g>
      <g class="nodes">
        <circle cx="70" cy="70" r="3"/>
        <circle cx="110" cy="85" r="3"/>
        <circle cx="150" cy="75" r="3"/>
        <circle cx="190" cy="95" r="3"/>
        <circle cx="140" cy="130" r="3"/>
        <circle cx="220" cy="110" r="3"/>
        <circle cx="120" cy="170" r="3"/>
        <circle cx="200" cy="160" r="3"/>
        <circle cx="160" cy="40" r="3"/>
        <circle cx="180" cy="125" r="5" class="hub"/>
      </g>
      <text x="188" y="142" class="hub-label">RO</text>
    </svg>
  </div>

  <section class="cta">
    <button class="btn-primary" id="btnPlay" type="button">
      <span>Intră în joc</span>
      <span class="arrow">→</span>
    </button>
    <button class="link-auth" id="btnAuth" type="button">Ai cont? Autentifică-te</button>
  </section>

  <footer class="foot">v1.0 · Beta</footer>
</main>
<script src="script.js" defer></script>
</body>
</html>
